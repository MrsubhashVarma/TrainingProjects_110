<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Online Examination System | Login</title>
  <meta name="description" content="Log in to your Online Examination System student dashboard or administrator portal.">
  <link rel="stylesheet" href="style.css">
  <script defer src="script.js"></script>
</head>
<body>

  <!-- Navigation Bar -->
  <header>
    <div class="container navbar">
      <a href="index.html" class="logo">
        <span>Examify</span>
      </a>
      <nav>
        <ul class="nav-links">
          <li><a href="index.html" class="nav-link">Home</a></li>
          <li><a href="exams.html" class="nav-link">Exams</a></li>
          <li id="student-dash-nav" style="display:none;"><a href="student_dashboard.html" class="nav-link">Dashboard</a></li>
          <li id="admin-dash-nav" style="display:none;"><a href="admin_dashboard.html" class="nav-link">Admin Portal</a></li>
        </ul>
      </nav>
      <div class="nav-actions">
        <button class="theme-toggle" id="theme-btn" aria-label="Toggle Theme">🌓</button>
        <div id="auth-buttons">
          <a href="login.html" class="btn btn-secondary btn-sm active">Login</a>
          <a href="register.html" class="btn btn-primary btn-sm">Register</a>
        </div>
        <div id="user-menu" style="display:none; align-items:center; gap:1rem;">
          <span id="user-name" style="font-weight:600; font-size:0.9rem;"></span>
          <button id="logout-btn" class="btn btn-secondary btn-sm">Logout</button>
        </div>
      </div>
    </div>
  </header>

  <!-- Login Form Container -->
  <main class="container" style="flex: 1; display: flex; align-items: center; justify-content: center;">
    <div class="form-container">
      <div class="form-header">
        <h2 id="login-title">Student Login</h2>
        <p id="login-subtitle">Access your personal dashboard and examinations</p>
      </div>

      <!-- Tab Toggle -->
      <div class="tab-toggle">
        <button class="tab-btn active" id="student-tab">Student</button>
        <button class="tab-btn" id="admin-tab">Administrator</button>
      </div>

      <form id="login-form">
        <!-- Hidden role parameter, default is student -->
        <input type="hidden" id="login-role" value="student">

        <div class="form-group">
          <label for="login-email" class="form-label">Email Address</label>
          <input type="email" id="login-email" class="form-input" placeholder="e.g. rahul@gmail.com" required autocomplete="email">
        </div>

        <div class="form-group" style="margin-bottom: 2rem;">
          <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 0.5rem;">
            <label for="login-password" class="form-label" style="margin-bottom: 0;">Password</label>
          </div>
          <input type="password" id="login-password" class="form-input" placeholder="••••••••" required autocomplete="current-password">
        </div>

        <button type="submit" class="btn btn-primary" style="width: 100%; padding: 0.75rem;">Sign In</button>
      </form>

      <div class="form-footer" id="register-redirect">
        Don't have an account? <a href="register.html">Register as Student</a>
      </div>
    </div>
  </main>

  <!-- Footer -->
  <footer class="footer">
    <div class="container">
      <p>&copy; 2026 Examify Online Examination Portal. Developed for Python-FSD.</p>
    </div>
  </footer>

  <!-- Toast Notification -->
  <div id="toast" class="toast"></div>

</body>
</html>
