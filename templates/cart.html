{% extends 'base.html' %}
{% load static %}

{% block content %}
<div style="max-width: 1000px; margin: 0 auto;">
    <h1 style="margin-bottom: 2rem; display: flex; align-items: center; gap: 0.75rem;">
        <i class="ph ph-shopping-cart"></i> Your Cart
    </h1>

    <div id="cart-container" class="layout-sidebar" style="display: none;">
        <!-- Cart Items -->
        <div>
            <div id="cart-items" class="glass-card" style="padding: 0;">
                <!-- Injected via JS -->
            </div>
        </div>

        <!-- Order Summary -->
        <div>
            <div class="glass-card" style="position: sticky; top: 100px;">
                <h3 style="margin-bottom: 1.5rem; border-bottom: 1px solid var(--glass-border); padding-bottom: 1rem;">Order Summary</h3>
                
                <div style="display: flex; justify-content: space-between; margin-bottom: 1rem; color: var(--text-secondary);">
                    <span>Subtotal</span>
                    <span id="summary-subtotal">₹0</span>
                </div>
                <div style="display: flex; justify-content: space-between; margin-bottom: 1.5rem; color: var(--text-secondary);">
                    <span>Delivery</span>
                    <span style="color: var(--success);">Free</span>
                </div>
                
                <div style="display: flex; justify-content: space-between; font-size: 1.25rem; font-weight: 700; margin-bottom: 2rem; border-top: 1px solid var(--glass-border); padding-top: 1rem;">
                    <span>Total</span>
                    <span id="summary-total" style="color: var(--accent-primary);">₹0</span>
                </div>

                <div class="form-group">
                    <label class="form-label">Delivery Address</label>
                    <textarea id="checkout-address" class="form-control" rows="3" placeholder="Enter complete delivery address..."></textarea>
                </div>

                <div class="form-group">
                    <label class="form-label">Payment Method</label>
                    <select id="payment-method" class="form-control">
                        <option value="Cash on Delivery">Cash on Delivery</option>
                        <option value="Credit Card">Credit Card (Mock)</option>
                        <option value="UPI">UPI (Mock)</option>
                    </select>
                </div>

                <button id="checkout-btn" onclick="placeOrder()" class="btn btn-primary" style="width: 100%; padding: 1rem; font-size: 1.1rem;">
                    <i class="ph ph-check-circle"></i> Place Order
                </button>
            </div>
        </div>
    </div>

    <div id="empty-cart" class="glass-card" style="display: none; text-align: center; padding: 4rem 2rem;">
        <i class="ph ph-shopping-cart" style="font-size: 5rem; color: var(--text-muted); margin-bottom: 1rem;"></i>
        <h2>Your cart is empty</h2>
        <p style="color: var(--text-secondary); margin-bottom: 2rem;">Looks like you haven't added any medicines yet.</p>
        <a href="{% url 'medicines' %}" class="btn btn-primary">Browse Medicines</a>
    </div>
</div>

<script>
document.addEventListener('DOMContentLoaded', loadCart);

async function loadCart() {
    if (!VitalisAPI.getUser()) {
        window.location.href = '/login/';
        return;
    }

    const res = await VitalisAPI.request('/cart');
    const container = document.getElementById('cart-container');
    const emptyState = document.getElementById('empty-cart');
    
    if (res.ok && res.data.data && res.data.data.items && res.data.data.items.length > 0) {
        const cart = res.data.data;
        container.style.display = 'grid';
        emptyState.style.display = 'none';

        const itemsHtml = cart.items.map(item => `
            <div class="cart-item">
                <div style="width: 60px; height: 60px; background: var(--bg-tertiary); border-radius: 8px; display: flex; align-items: center; justify-content: center;">
                    ${item.image ? `<img src="${item.image}" style="max-width: 100%; max-height: 100%; border-radius: 8px;">` : `<i class="ph ph-pill" style="font-size: 1.5rem; color: var(--text-muted);"></i>`}
                </div>
                <div>
                    <h4 style="margin-bottom: 0.25rem;">${item.medicineName}</h4>
                    <div style="color: var(--accent-primary); font-weight: 600;">₹${item.price}</div>
                </div>
                <div class="qty-controls">
                    <button class="qty-btn" onclick="updateQty('${item.medicineId}', ${item.quantity - 1})">-</button>
                    <span style="width: 30px; text-align: center; font-weight: bold;">${item.quantity}</span>
                    <button class="qty-btn" onclick="updateQty('${item.medicineId}', ${item.quantity + 1})">+</button>
                </div>
                <div>
                    <div style="font-weight: 700; font-size: 1.1rem;">₹${item.price * item.quantity}</div>
                    <button onclick="removeItem('${item.medicineId}')" class="btn" style="background: transparent; color: var(--danger); padding: 0.25rem; font-size: 0.8rem; border: none; float: right; margin-top: 0.5rem;"><i class="ph ph-trash"></i> Remove</button>
                </div>
            </div>
        `).join('');

        document.getElementById('cart-items').innerHTML = itemsHtml;
        document.getElementById('summary-subtotal').textContent = `₹${cart.total}`;
        document.getElementById('summary-total').textContent = `₹${cart.total}`;
        
        // Pre-fill address if user has one
        const user = VitalisAPI.getUser();
        if (user && user.address && !document.getElementById('checkout-address').value) {
            document.getElementById('checkout-address').value = user.address;
        }

    } else {
        container.style.display = 'none';
        emptyState.style.display = 'block';
    }
}

async function updateQty(id, newQty) {
    if (newQty < 1) {
        removeItem(id);
        return;
    }
    const res = await VitalisAPI.request('/cart/update', 'PUT', { medicineId: id, quantity: newQty });
    if (res.ok) loadCart();
    else VitalisAPI.showToast(res.data.message || 'Failed to update quantity', 'error');
}

async function removeItem(id) {
    const res = await VitalisAPI.request(`/cart/remove/${id}`, 'DELETE');
    if (res.ok) {
        VitalisAPI.showToast('Item removed', 'success');
        loadCart();
    }
}

async function placeOrder() {
    const address = document.getElementById('checkout-address').value.trim();
    const paymentMethod = document.getElementById('payment-method').value;

    if (!address) {
        VitalisAPI.showToast('Please enter a delivery address', 'warning');
        return;
    }

    const btn = document.getElementById('checkout-btn');
    btn.disabled = true;
    btn.innerHTML = '<i class="ph ph-spinner ph-spin"></i> Processing...';

    const res = await VitalisAPI.request('/orders', 'POST', { address, paymentMethod });
    
    if (res.ok && res.data.success) {
        VitalisAPI.showToast('Order placed successfully!', 'success');
        setTimeout(() => window.location.href = '/orders/', 1500);
    } else {
        VitalisAPI.showToast(res.data.message || 'Failed to place order', 'error');
        btn.disabled = false;
        btn.innerHTML = '<i class="ph ph-check-circle"></i> Place Order';
    }
}
</script>
{% endblock %}
