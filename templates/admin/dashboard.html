{% extends 'base.html' %}
{% load static %}

{% block content %}
<div class="layout-sidebar">
    <!-- Admin Sidebar -->
    <aside>
        <div class="glass-card sidebar-nav">
            <h3 style="margin-bottom: 1rem; color: var(--text-muted); font-size: 0.8rem; text-transform: uppercase; letter-spacing: 1px;">Admin Panel</h3>
            <a href="{% url 'admin_dashboard' %}" class="sidebar-link active"><i class="ph ph-squares-four"></i> Dashboard</a>
            <a href="{% url 'admin_medicines' %}" class="sidebar-link"><i class="ph ph-pill"></i> Medicines</a>
            <a href="{% url 'admin_categories' %}" class="sidebar-link"><i class="ph ph-list-dashes"></i> Categories</a>
            <a href="{% url 'admin_orders' %}" class="sidebar-link"><i class="ph ph-receipt"></i> Orders</a>
            <a href="{% url 'admin_users' %}" class="sidebar-link"><i class="ph ph-users"></i> Users</a>
        </div>
    </aside>

    <!-- Main Dashboard Content -->
    <div>
        <h1 style="margin-bottom: 2rem;">Dashboard Overview</h1>

        <div id="loading" style="text-align: center; margin: 4rem 0;">
            <i class="ph ph-spinner ph-spin" style="font-size: 3rem; color: var(--accent-primary);"></i>
        </div>

        <div id="dashboard-content" style="display: none;">
            <!-- Stats Grid -->
            <div class="grid-3" style="margin-bottom: 3rem;">
                <div class="glass-card" style="padding: 1.5rem; border-left: 4px solid var(--accent-primary);">
                    <div style="color: var(--text-secondary); font-size: 0.9rem; margin-bottom: 0.5rem; text-transform: uppercase;">Total Revenue</div>
                    <div id="stat-revenue" style="font-size: 2rem; font-weight: 700; color: var(--text-primary);"></div>
                </div>
                
                <div class="glass-card" style="padding: 1.5rem; border-left: 4px solid var(--success);">
                    <div style="color: var(--text-secondary); font-size: 0.9rem; margin-bottom: 0.5rem; text-transform: uppercase;">Total Orders</div>
                    <div id="stat-orders" style="font-size: 2rem; font-weight: 700; color: var(--text-primary);"></div>
                </div>

                <div class="glass-card" style="padding: 1.5rem; border-left: 4px solid var(--warning);">
                    <div style="color: var(--text-secondary); font-size: 0.9rem; margin-bottom: 0.5rem; text-transform: uppercase;">Low Stock Items</div>
                    <div id="stat-low-stock" style="font-size: 2rem; font-weight: 700; color: var(--text-primary);"></div>
                </div>

                <div class="glass-card" style="padding: 1.5rem; border-left: 4px solid var(--text-muted);">
                    <div style="color: var(--text-secondary); font-size: 0.9rem; margin-bottom: 0.5rem; text-transform: uppercase;">Total Medicines</div>
                    <div id="stat-medicines" style="font-size: 2rem; font-weight: 700; color: var(--text-primary);"></div>
                </div>

                <div class="glass-card" style="padding: 1.5rem; border-left: 4px solid var(--text-muted);">
                    <div style="color: var(--text-secondary); font-size: 0.9rem; margin-bottom: 0.5rem; text-transform: uppercase;">Total Categories</div>
                    <div id="stat-categories" style="font-size: 2rem; font-weight: 700; color: var(--text-primary);"></div>
                </div>

                <div class="glass-card" style="padding: 1.5rem; border-left: 4px solid var(--text-muted);">
                    <div style="color: var(--text-secondary); font-size: 0.9rem; margin-bottom: 0.5rem; text-transform: uppercase;">Total Customers</div>
                    <div id="stat-users" style="font-size: 2rem; font-weight: 700; color: var(--text-primary);"></div>
                </div>
            </div>

            <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 2rem;">
                <!-- Recent Orders -->
                <div class="glass-card" style="padding: 1.5rem;">
                    <h3 style="margin-bottom: 1.5rem; display: flex; justify-content: space-between;">
                        Recent Orders <a href="{% url 'admin_orders' %}" style="font-size: 0.9rem; font-weight: 500;">View All</a>
                    </h3>
                    <div id="recent-orders-list" style="display: flex; flex-direction: column; gap: 1rem;">
                        <!-- Injected -->
                    </div>
                </div>

                <!-- Low Stock Alerts -->
                <div class="glass-card" style="padding: 1.5rem;">
                    <h3 style="margin-bottom: 1.5rem; display: flex; justify-content: space-between;">
                        Low Stock Alerts <a href="{% url 'admin_medicines' %}" style="font-size: 0.9rem; font-weight: 500;">Manage</a>
                    </h3>
                    <div id="low-stock-list" style="display: flex; flex-direction: column; gap: 1rem;">
                        <!-- Injected -->
                    </div>
                </div>
            </div>

        </div>
    </div>
</div>

<script>
document.addEventListener('DOMContentLoaded', async () => {
    if (!VitalisAPI.isAdmin()) {
        window.location.href = '/';
        return;
    }

    const res = await VitalisAPI.request('/dashboard');
    document.getElementById('loading').style.display = 'none';

    if (res.ok && res.data.data) {
        document.getElementById('dashboard-content').style.display = 'block';
        const stats = res.data.data;

        document.getElementById('stat-revenue').textContent = `₹${stats.revenue}`;
        document.getElementById('stat-orders').textContent = stats.totalOrders;
        document.getElementById('stat-low-stock').textContent = stats.lowStockCount;
        document.getElementById('stat-medicines').textContent = stats.totalMedicines;
        document.getElementById('stat-categories').textContent = stats.totalCategories;
        document.getElementById('stat-users').textContent = stats.totalUsers;

        // Fetch Recent Orders
        const roRes = await VitalisAPI.request('/dashboard/recent-orders');
        if (roRes.ok && roRes.data.data) {
            document.getElementById('recent-orders-list').innerHTML = roRes.data.data.slice(0, 5).map(o => `
                <div style="display: flex; justify-content: space-between; align-items: center; border-bottom: 1px solid var(--glass-border); padding-bottom: 0.5rem;">
                    <div>
                        <div style="font-weight: 600;">#${o._id.substring(18)}</div>
                        <div style="font-size: 0.8rem; color: var(--text-secondary);">${o.userName}</div>
                    </div>
                    <div style="text-align: right;">
                        <div style="font-weight: 700; color: var(--accent-primary);">₹${o.totalAmount}</div>
                        <div style="font-size: 0.8rem;" class="${o.status === 'Delivered' ? 'text-success' : 'text-warning'}">${o.status}</div>
                    </div>
                </div>
            `).join('');
        }

        // Fetch Low Stock
        const lsRes = await VitalisAPI.request('/dashboard/low-stock');
        if (lsRes.ok && lsRes.data.data) {
            const list = lsRes.data.data.slice(0, 5);
            if (list.length === 0) {
                document.getElementById('low-stock-list').innerHTML = '<div style="color: var(--success);"><i class="ph ph-check-circle"></i> Stock levels are healthy</div>';
            } else {
                document.getElementById('low-stock-list').innerHTML = list.map(m => `
                    <div style="display: flex; justify-content: space-between; align-items: center; border-bottom: 1px solid var(--glass-border); padding-bottom: 0.5rem;">
                        <div>
                            <div style="font-weight: 600;">${m.medicineName}</div>
                            <div style="font-size: 0.8rem; color: var(--text-secondary);">${m.brand}</div>
                        </div>
                        <div style="font-weight: 700; color: var(--danger); background: rgba(239,68,68,0.1); padding: 0.2rem 0.5rem; border-radius: 4px;">
                            ${m.stock} left
                        </div>
                    </div>
                `).join('');
            }
        }

    } else {
        VitalisAPI.showToast('Failed to load dashboard data', 'error');
    }
});
</script>
{% endblock %}
