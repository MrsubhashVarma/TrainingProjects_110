{% extends 'base.html' %}
{% load static %}

{% block content %}
<div style="max-width: 1000px; margin: 0 auto;">
    <h1 style="margin-bottom: 2rem; display: flex; align-items: center; gap: 0.75rem;">
        <i class="ph ph-receipt"></i> Your Orders
    </h1>

    <div id="loading" style="text-align: center; margin: 4rem 0;">
        <i class="ph ph-spinner ph-spin" style="font-size: 3rem; color: var(--accent-primary);"></i>
    </div>

    <div id="orders-container" style="display: none; display: flex; flex-direction: column; gap: 1.5rem;">
        <!-- Orders injected here -->
    </div>

    <div id="empty-orders" class="glass-card" style="display: none; text-align: center; padding: 4rem 2rem;">
        <i class="ph ph-package" style="font-size: 5rem; color: var(--text-muted); margin-bottom: 1rem;"></i>
        <h2>No orders found</h2>
        <p style="color: var(--text-secondary); margin-bottom: 2rem;">You haven't placed any orders yet.</p>
        <a href="{% url 'medicines' %}" class="btn btn-primary">Start Shopping</a>
    </div>
</div>

<script>
document.addEventListener('DOMContentLoaded', async () => {
    if (!VitalisAPI.getUser()) {
        window.location.href = '/login/';
        return;
    }

    const res = await VitalisAPI.request('/orders');
    document.getElementById('loading').style.display = 'none';

    if (res.ok && res.data.data && res.data.data.length > 0) {
        const orders = res.data.data;
        document.getElementById('orders-container').style.display = 'flex';
        
        document.getElementById('orders-container').innerHTML = orders.map(o => {
            const date = new Date(o.createdAt).toLocaleDateString('en-US', { year: 'numeric', month: 'long', day: 'numeric' });
            
            let statusColor = 'var(--text-secondary)';
            if (o.status === 'Pending') statusColor = 'var(--warning)';
            if (o.status === 'Confirmed' || o.status === 'Dispatched') statusColor = 'var(--accent-primary)';
            if (o.status === 'Delivered') statusColor = 'var(--success)';
            if (o.status === 'Cancelled') statusColor = 'var(--danger)';

            return `
            <div class="glass-card">
                <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 1rem; padding-bottom: 1rem; border-bottom: 1px solid var(--glass-border);">
                    <div>
                        <div style="font-size: 0.9rem; color: var(--text-muted);">Order Placed: ${date}</div>
                        <div style="font-weight: 600; font-family: monospace;">#${o._id.substring(18)}</div>
                    </div>
                    <div style="text-align: right;">
                        <div style="font-weight: 700; font-size: 1.25rem;">₹${o.totalAmount}</div>
                        <div style="font-weight: 600; color: ${statusColor};">${o.status}</div>
                    </div>
                </div>
                
                <div style="display: flex; gap: 1rem; flex-wrap: wrap;">
                    ${o.items.map(item => `
                        <div style="display: flex; align-items: center; gap: 0.5rem; background: rgba(0,0,0,0.2); padding: 0.5rem 1rem; border-radius: var(--radius-sm);">
                            <span style="font-weight: 600;">${item.quantity}x</span>
                            <span>${item.medicineName}</span>
                        </div>
                    `).join('')}
                </div>
                
                <div style="margin-top: 1.5rem; display: flex; justify-content: flex-end; gap: 1rem;">
                    ${o.status === 'Pending' ? `<button onclick="cancelOrder('${o._id}')" class="btn btn-danger btn-sm">Cancel Order</button>` : ''}
                    <a href="/orders/${o._id}/" class="btn btn-secondary">View Details</a>
                </div>
            </div>
            `;
        }).join('');
    } else {
        document.getElementById('empty-orders').style.display = 'block';
    }
});

async function cancelOrder(orderId) {
    if (!confirm('Are you sure you want to cancel this order?')) return;
    
    const res = await VitalisAPI.request(`/orders/${orderId}`, 'PUT', { status: 'Cancelled' });
    if (res.ok && res.data.success) {
        VitalisAPI.showToast('Order cancelled successfully', 'success');
        setTimeout(() => window.location.reload(), 1000);
    } else {
        VitalisAPI.showToast(res.data.message || 'Failed to cancel order', 'error');
    }
}
</script>
{% endblock %}
