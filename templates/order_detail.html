{% extends 'base.html' %}
{% load static %}

{% block content %}
<div style="max-width: 800px; margin: 0 auto;">
    <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 2rem;">
        <h1 style="display: flex; align-items: center; gap: 0.75rem;">
            <i class="ph ph-receipt"></i> Order Details
        </h1>
        <a href="{% url 'orders' %}" class="btn btn-secondary"><i class="ph ph-arrow-left"></i> Back to Orders</a>
    </div>

    <div id="loading" style="text-align: center; margin: 4rem 0;">
        <i class="ph ph-spinner ph-spin" style="font-size: 3rem; color: var(--accent-primary);"></i>
    </div>

    <div id="order-content" style="display: none; display: grid; gap: 2rem;">
        <div class="glass-card">
            <div style="display: flex; justify-content: space-between; border-bottom: 1px solid var(--glass-border); padding-bottom: 1rem; margin-bottom: 1.5rem;">
                <div>
                    <h3 style="margin-bottom: 0.25rem;">Order <span id="order-id-display" style="font-family: monospace; color: var(--text-secondary);"></span></h3>
                    <div id="order-date" style="color: var(--text-muted); font-size: 0.9rem;"></div>
                </div>
                <div style="text-align: right;">
                    <div id="order-status" style="font-weight: 700; font-size: 1.1rem; margin-bottom: 0.25rem;"></div>
                    <div id="order-total" style="font-weight: 700; font-size: 1.5rem; color: var(--accent-primary);"></div>
                </div>
            </div>

            <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 2rem; margin-bottom: 2rem;">
                <div>
                    <h4 style="margin-bottom: 0.5rem; color: var(--text-secondary); text-transform: uppercase; font-size: 0.8rem; letter-spacing: 0.5px;">Delivery Address</h4>
                    <p id="order-address" style="line-height: 1.6;"></p>
                </div>
                <div>
                    <h4 style="margin-bottom: 0.5rem; color: var(--text-secondary); text-transform: uppercase; font-size: 0.8rem; letter-spacing: 0.5px;">Payment Method</h4>
                    <p id="order-payment" style="font-weight: 500;"></p>
                </div>
            </div>

            <h4 style="margin-bottom: 1rem; border-bottom: 1px solid var(--glass-border); padding-bottom: 0.5rem;">Items</h4>
            <div id="order-items" style="display: flex; flex-direction: column; gap: 1rem;">
                <!-- Items injected here -->
            </div>
        </div>
    </div>
</div>

<script>
const orderId = "{{ order_id }}";

document.addEventListener('DOMContentLoaded', async () => {
    if (!VitalisAPI.getUser()) {
        window.location.href = '/login/';
        return;
    }

    const res = await VitalisAPI.request(`/orders/${orderId}`);
    document.getElementById('loading').style.display = 'none';

    if (res.ok && res.data.data) {
        const o = res.data.data;
        document.getElementById('order-content').style.display = 'grid';
        
        document.getElementById('order-id-display').textContent = `#${o._id.substring(18)}`;
        document.getElementById('order-date').textContent = new Date(o.createdAt).toLocaleString();
        document.getElementById('order-total').textContent = `₹${o.totalAmount}`;
        document.getElementById('order-address').textContent = o.shippingAddress;
        document.getElementById('order-payment').textContent = o.paymentMethod;
        
        let statusColor = 'var(--text-secondary)';
        if (o.status === 'Pending') statusColor = 'var(--warning)';
        if (o.status === 'Confirmed' || o.status === 'Dispatched') statusColor = 'var(--accent-primary)';
        if (o.status === 'Delivered') statusColor = 'var(--success)';
        if (o.status === 'Cancelled') statusColor = 'var(--danger)';
        
        const statusEl = document.getElementById('order-status');
        statusEl.textContent = o.status;
        statusEl.style.color = statusColor;

        document.getElementById('order-items').innerHTML = o.items.map(item => `
            <div style="display: flex; justify-content: space-between; align-items: center; background: rgba(0,0,0,0.2); padding: 1rem; border-radius: var(--radius-sm);">
                <div style="display: flex; align-items: center; gap: 1rem;">
                    <div style="width: 40px; height: 40px; background: var(--bg-tertiary); border-radius: 4px; display: flex; align-items: center; justify-content: center;">
                        ${item.image ? `<img src="${item.image}" style="max-width:100%; max-height:100%; border-radius:4px;">` : `<i class="ph ph-pill"></i>`}
                    </div>
                    <div>
                        <div style="font-weight: 600;">${item.medicineName}</div>
                        <div style="color: var(--text-muted); font-size: 0.9rem;">Qty: ${item.quantity} × ₹${item.price}</div>
                    </div>
                </div>
                <div style="font-weight: 700; font-size: 1.1rem;">₹${item.quantity * item.price}</div>
            </div>
        `).join('');

    } else {
        VitalisAPI.showToast('Order not found', 'error');
        setTimeout(() => window.location.href = '/orders/', 1500);
    }
});
</script>
{% endblock %}
