<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TaskFlow | To-Do List Management System</title>
    <link rel="stylesheet" href="style.css">
    <!-- Google Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
</head>
<body>
    <div class="app-container">
        <!-- Sidebar / Task Form Panel -->
        <aside class="sidebar glass-panel">
            <div class="logo-area">
                <div class="logo-icon">
                    <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><path d="m9 11-4 4 4 4"/><path d="m19 13-4-4 4-4"/><path d="M5 5h14a2 2 0 0 1 2 2v10a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2V7a2 2 0 0 1 2-2Z"/></svg>
                </div>
                <h1>TaskFlow</h1>
            </div>
            
            <div class="db-status-badge" id="db-status-badge">
                <span class="status-dot"></span>
                <span class="status-text">Connecting...</span>
            </div>
            
            <div class="form-card">
                <h2>Create New Task</h2>
                <form id="add-task-form">
                    <div class="input-group">
                        <label for="task-title">Task Title</label>
                        <input type="text" id="task-title" placeholder="What needs to be done?" required>
                    </div>
                    
                    <div class="input-group">
                        <label for="task-desc">Description</label>
                        <textarea id="task-desc" rows="4" placeholder="Describe this task..." required></textarea>
                    </div>
                    
                    <div class="form-row">
                        <div class="input-group">
                            <label for="task-priority">Priority</label>
                            <div class="select-wrapper">
                                <select id="task-priority" required>
                                    <option value="High">🔴 High</option>
                                    <option value="Medium" selected>🟡 Medium</option>
                                    <option value="Low">🟢 Low</option>
                                </select>
                            </div>
                        </div>
                        
                        <div class="input-group">
                            <label for="task-status">Status</label>
                            <div class="select-wrapper">
                                <select id="task-status" required>
                                    <option value="Pending" selected>⏳ Pending</option>
                                    <option value="Completed">✅ Completed</option>
                                </select>
                            </div>
                        </div>
                    </div>
                    
                    <button type="submit" class="btn btn-primary">
                        <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><line x1="12" y1="5" x2="12" y2="19"></line><line x1="5" y1="12" x2="19" y2="12"></line></svg>
                        Add Task
                    </button>
                </form>
            </div>
        </aside>

        <!-- Main Task List Area -->
        <main class="main-content">
            <!-- Header & Stats Dashboard -->
            <header class="dashboard-header">
                <div class="welcome-text">
                    <h1>Dashboard</h1>
                    <p>Keep track of your tasks and milestones.</p>
                </div>
                
                <!-- Quick Stats Grid -->
                <div class="stats-grid">
                    <div class="stat-card glass-panel count-all">
                        <div class="stat-icon">
                            <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M12 20h9"/><path d="M16.5 3.5a2.12 2.12 0 0 1 3 3L7 19l-4 1 1-4Z"/></svg>
                        </div>
                        <div class="stat-info">
                            <span class="stat-value" id="stat-total-count">0</span>
                            <span class="stat-label">Total Tasks</span>
                        </div>
                    </div>
                    
                    <div class="stat-card glass-panel count-pending">
                        <div class="stat-icon text-warning">
                            <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="10"/><polyline points="12 6 12 12 16 14"/></svg>
                        </div>
                        <div class="stat-info">
                            <span class="stat-value text-warning" id="stat-pending-count">0</span>
                            <span class="stat-label">Pending</span>
                        </div>
                    </div>
                    
                    <div class="stat-card glass-panel count-completed">
                        <div class="stat-icon text-success">
                            <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M22 11.08V12a10 10 0 1 1-5.93-9.14"/><polyline points="22 4 12 14.01 9 11.01"/></svg>
                        </div>
                        <div class="stat-info">
                            <span class="stat-value text-success" id="stat-completed-count">0</span>
                            <span class="stat-label">Completed</span>
                        </div>
                    </div>
                </div>
            </header>

            <!-- Filter & Filter Actions Bar -->
            <div class="action-bar glass-panel">
                <div class="filter-tabs">
                    <button class="filter-tab active" data-filter="all">All Tasks</button>
                    <button class="filter-tab" data-filter="Pending">Pending</button>
                    <button class="filter-tab" data-filter="Completed">Completed</button>
                </div>
                
                <div class="search-bar">
                    <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><circle cx="11" cy="11" r="8"></circle><line x1="21" y1="21" x2="16.65" y2="16.65"></line></svg>
                    <input type="text" id="search-input" placeholder="Search tasks...">
                </div>
            </div>

            <!-- Task List Grid -->
            <div class="tasks-container" id="tasks-container">
                <!-- Loading State -->
                <div class="loading-spinner-wrapper" id="loading-state">
                    <div class="spinner"></div>
                    <p>Loading your schedule...</p>
                </div>

                <!-- Empty State -->
                <div class="empty-state hidden" id="empty-state">
                    <div class="empty-icon">
                        <svg xmlns="http://www.w3.org/2000/svg" width="48" height="48" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"><path d="M14.5 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V7.5L14.5 2z"/><polyline points="14 2 14 8 20 8"/><path d="M16 13H8"/><path d="M16 17H8"/><path d="M10 9H8"/></svg>
                    </div>
                    <h3>No tasks found</h3>
                    <p>Create a task to get started on your agenda!</p>
                </div>

                <!-- Tasks will be rendered dynamically here -->
            </div>
        </main>
    </div>

    <!-- Update Task Modal -->
    <div class="modal-overlay" id="update-modal">
        <div class="modal-content glass-panel animate-slide-down">
            <button class="close-btn" id="close-modal-btn">
                <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><line x1="18" y1="6" x2="6" y2="18"></line><line x1="6" y1="6" x2="18" y2="18"></line></svg>
            </button>
            <h2>Update Task</h2>
            <form id="update-task-form">
                <input type="hidden" id="edit-task-id">
                
                <div class="input-group">
                    <label for="edit-task-title">Task Title</label>
                    <input type="text" id="edit-task-title" required>
                </div>
                
                <div class="input-group">
                    <label for="edit-task-desc">Description</label>
                    <textarea id="edit-task-desc" rows="4" required></textarea>
                </div>
                
                <div class="form-row">
                    <div class="input-group">
                        <label for="edit-task-priority">Priority</label>
                        <div class="select-wrapper">
                            <select id="edit-task-priority" required>
                                <option value="High">🔴 High</option>
                                <option value="Medium">🟡 Medium</option>
                                <option value="Low">🟢 Low</option>
                            </select>
                        </div>
                    </div>
                    
                    <div class="input-group">
                        <label for="edit-task-status">Status</label>
                        <div class="select-wrapper">
                            <select id="edit-task-status" required>
                                <option value="Pending">⏳ Pending</option>
                                <option value="Completed">✅ Completed</option>
                            </select>
                        </div>
                    </div>
                </div>
                
                <div class="modal-actions">
                    <button type="button" class="btn btn-secondary" id="cancel-edit-btn">Cancel</button>
                    <button type="submit" class="btn btn-primary">Save Changes</button>
                </div>
            </form>
        </div>
    </div>

    <!-- Notification Toast -->
    <div class="toast-container" id="toast-container"></div>
    
    <!-- App Logic -->
    <script src="script.js"></script>
</body>
</html>
